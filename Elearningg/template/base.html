<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #b7cae5;
        }
        .priority-high { color: red; font-weight: bold; }
        .priority-medium { color: orange; }
        .priority-low { color: green; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href={% url 'dashboard' %}>StudyPlanner</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                
                <li class="nav-item fw-bold"><a class="nav-link"> <i class="fas fa-user-circle m-2"> </i>{{user.username}}</a></li>
                
                <li class="nav-item fw-bold"><a class="nav-link" href={% url 'dashboard'  %}>Dashboard</a></li>
                <li class="nav-item fw-bold"><a class="nav-link" href={% url 'add_task' %}>Add Task</a></li>
                <li class="nav-item fw-bold"><a class="nav-link" href={% url 'signup' %}>Logout</a></li>
                <!-- <li class="nav-item"><a class="nav-link" href={% url 'signup' %}>Signup</a></li> -->
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
